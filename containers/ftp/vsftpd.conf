# ============================================================
# VSFTPD CONFIGURATION FILE
# ============================================================

# ============================================================
# BASIC SETTINGS
#
# listen=YES → vsftpd runs in standalone mode
#              (not launched by inetd/xinetd)
#              It manages its own socket and connections.
#
# listen_ipv6=NO → disable IPv6 — we only use IPv4 in our lab
# ============================================================
listen=YES
listen_ipv6=NO

# ============================================================
# ANONYMOUS ACCESS
#
# anonymous_enable=NO → disable anonymous FTP login
#                       Users MUST authenticate with
#                       a username and password.
#                       Safer for a DMZ server.
# ============================================================
anonymous_enable=NO

# ============================================================
# LOCAL USER SETTINGS
#
# local_enable=YES → allow local system users to log in
#                    (like the ftpuser we created)
#
# write_enable=YES → allow users to upload files
#                    without this, FTP is read-only
#
# local_umask=022  → sets default permissions on uploaded files
#                    022 means files get 644 permissions
#                    (owner read/write, others read-only)
# ============================================================
local_enable=YES
write_enable=YES
local_umask=022

# ============================================================
# CHROOT JAIL
#
# chroot_local_user=YES → lock users inside their home directory
#                         They cannot browse outside /home/ftpuser
#                         This is a critical security feature —
#                         users can't access /etc, /var, etc.
#
# allow_writeable_chroot=YES → needed when the chroot directory
#                              itself is writeable by the user
#                              without this vsftpd refuses to start
# ============================================================
chroot_local_user=YES
allow_writeable_chroot=YES

# ============================================================
# PASSIVE MODE
#
# In active mode: CLIENT opens a port, server connects to it
#                 This breaks with firewalls/NAT (pfSense will block it)
#
# In passive mode: SERVER opens a port, client connects to it
#                  This works through firewalls — preferred in our lab
#
# pasv_enable=YES          → enable passive mode
# pasv_min_port=21100      → lowest port for passive data connections
# pasv_max_port=21110      → highest port for passive data connections
#                            vsftpd picks a random port in this range
#                            for each passive transfer
# ============================================================

pasv_enable=YES
pasv_min_port=21100
pasv_max_port=21110

# ============================================================
# LOGGING
#
# xferlog_enable=YES → log all file transfers
#                      useful for monitoring who uploaded/downloaded what
# ============================================================
xferlog_enable=YES

# ============================================================
# BACKGROUND MODE
#
# background=NO → run in foreground
#                 Required to keep Docker container alive
# ============================================================
background=NO