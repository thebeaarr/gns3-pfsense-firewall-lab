# ============================================================
# DOVECOT CONFIGURATION
# Handles IMAP access so clients can read their mail.
# ============================================================

# ============================================================
# PROTOCOLS
# We enable both IMAP and POP3.
# IMAP  → mail stays on server, client syncs with it
# POP3  → client downloads and removes mail from server
# For our lab IMAP is more useful for testing.
# ============================================================
protocols = imap pop3

# ============================================================
# LISTEN
# Listen on all interfaces so any GNS3 node can connect.
# ============================================================
listen = *

# ============================================================
# MAIL LOCATION
# Tells Dovecot where Postfix stores the emails.
# Must match home_mailbox setting in Postfix (Maildir/).
# ============================================================
mail_location = maildir:~/Maildir

# ============================================================
# AUTHENTICATION
# allow_plaintext_auth → allow plain text passwords
#                        Not secure in production but fine for lab.
# auth_mechanisms      → plain and login are the two most
#                        common authentication methods
#                        supported by all mail clients.
# ============================================================
auth_mechanisms = plain login
disable_plaintext_auth = no